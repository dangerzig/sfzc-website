baseURL = "https://dangerzig.github.io/sfzc-website/v2/"
languageCode = "en-us"
title = "San Francisco Zen Center"

[params]
  description = "San Francisco Zen Center – City Center, Green Gulch Farm, Tassajara"
  tagline = "Beginner's Mind Temple"

# Taxonomies for connected content
[taxonomies]
  center = "centers"
  role = "roles"
  topic = "topics"
  event_type = "event-types"
  teacher_slug = "teacher-slugs"

# Clean URLs
[permalinks]
  [permalinks.page]
    teachers = "/teachers/:slug/"
    dharma-talks = "/dharma-talks/:slug/"
    events = "/events/:slug/"

# Main navigation (simplified per Vanessa Aida proposal)
[[menus.main]]
