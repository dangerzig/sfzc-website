  url = "https://store.sfzc.org"
  weight = 10

[[menus.utility]]
  name = "News"
  url = "/news/"
  weight = 20

[[menus.utility]]
  name = "Livestream"
  url = "/dharma-talks/livestream/"
  weight = 30

[[menus.utility]]
  name = "Donate"
  url = "https://giving.sfzc.org"
  weight = 50

# Build settings
[build]
  [build.buildStats]
    enable = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[sitemap]
  changeFreq = "weekly"
  priority = 0.5
