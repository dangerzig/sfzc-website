{{ define "main" }}
<div class="max-w-4xl mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold text-sfzc-red mb-2">Dharma Talks</h1>
  <p class="text-gray-600 mb-6">Browse recorded dharma talks from San Francisco Zen Center teachers.</p>

  <!-- Filters -->
  <div class="flex flex-wrap gap-3 mb-8" id="talk-filters">
    <div>
      <label class="text-sm font-medium text-gray-700 block mb-1">Center</label>
      <select data-filter="center" class="border border-gray-300 rounded px-3 py-1.5 text-sm">
        <option value="">All Centers</option>
        <option value="City Center">City Center</option>
        <option value="Green Gulch Farm">Green Gulch Farm</option>
        <option value="Tassajara">Tassajara</option>
        <option value="Online">Online</option>
      </select>
    </div>
    <div>
      <label class="text-sm font-medium text-gray-700 block mb-1">Speaker</label>
      <select data-filter="speaker" class="border border-gray-300 rounded px-3 py-1.5 text-sm">
        <option value="">All Speakers</option>
        {{/* Dynamically populate unique speakers */}}
        {{ $speakers := slice }}
        {{ range .Pages }}
          {{ with .Params.speaker }}
            {{ $speakers = $speakers | append . }}
          {{ end }}
        {{ end }}
        {{ $speakers = $speakers | uniq | sort }}
        {{ range $speakers }}
          {{ $teacher := site.GetPage (printf "/teachers/%s" .) }}
          <option value="{{ . }}">{{ with $teacher }}{{ .Title }}{{ else }}{{ . }}{{ end }}</option>
        {{ end }}
      </select>
    </div>
  </div>

  <div class="space-y-3" id="talk-list">
    {{ range .Pages }}
      {{ partial "talk-card.html" . }}
    {{ end }}
  </div>

  <p id="no-results" class="hidden text-gray-500 text-center py-8">No talks match the selected filters.</p>
</div>
{{ end }}
