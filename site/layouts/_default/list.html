{{ define "main" }}
<div class="max-w-7xl mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold text-sfzc-red mb-6">{{ .Title }}</h1>
  {{ with .Content }}
  <div class="prose max-w-none mb-8">
    {{ . }}
  </div>
  {{ end }}
  <div class="space-y-4">
    {{ range .Pages }}
    <div class="border border-gray-200 rounded-lg p-4 card-hover">
      <h2 class="text-xl font-semibold">
        <a href="{{ .Permalink }}" class="text-sfzc-red hover:text-sfzc-red-light">{{ .Title }}</a>
      </h2>
      {{ with .Description }}<p class="text-gray-600 mt-1">{{ . }}</p>{{ end }}
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
