<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+SC:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ "images/favicons/apple-touch-icon.png" | absURL }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "images/favicons/favicon-32x32.png" | absURL }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ "images/favicons/favicon-16x16.png" | absURL }}">
  <link rel="manifest" href="{{ "images/favicons/site.webmanifest" | absURL }}">
  <link rel="mask-icon" href="{{ "images/favicons/safari-pinned-tab.svg" | absURL }}" color="#77180C">
  <link rel="stylesheet" href="{{ "css/main.css" | absURL }}">
  <link rel="stylesheet" href="{{ "css/themes.css" | absURL }}">
  <script>
    // Apply saved theme before paint to prevent flash
    (function() {
      var t = localStorage.getItem('sfzc-theme');
      if (t && t !== 'classic') document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  {{ template "_internal/opengraph.html" . }}
</head>
<body class="min-h-screen flex flex-col bg-white">
  {{ partial "header.html" . }}
  <main class="flex-1">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="{{ "js/filter.js" | absURL }}" defer></script>
  <script src="{{ "js/theme-switcher.js" | absURL }}" defer></script>
</body>
</html>
