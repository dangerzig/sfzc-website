<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/main.css" | absURL }}">
  {{ template "_internal/opengraph.html" . }}
</head>
<body class="min-h-screen flex flex-col bg-white">
  {{ partial "header.html" . }}
  <main class="flex-1">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <!-- Back to top button -->
  <button id="back-to-top" aria-label="Back to top" style="display:none; position:fixed; bottom:2rem; right:2rem; z-index:50; width:48px; height:48px; border-radius:50%; background-color:#1a1a1a; color:#c9a227; border:2px solid #c9a227; cursor:pointer; font-size:1.5rem; line-height:1; box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: opacity 0.3s, transform 0.3s;" title="Back to top">&#8593;</button>
  <script>
  (function() {
    var btn = document.getElementById('back-to-top');
    window.addEventListener('scroll', function() {
      btn.style.display = window.scrollY > 400 ? 'block' : 'none';
    });
    btn.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  })();
  </script>
  <script src="{{ "js/filter.js" | absURL }}" defer></script>
</body>
</html>
