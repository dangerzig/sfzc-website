name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout v2 branch
        uses: actions/checkout@v4
        with:
          ref: design-v2-photo-forward
          path: v2
        continue-on-error: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      # Build main site
      - name: Install dependencies (main)
        working-directory: ./main/site
        run: npm ci

      - name: Build Tailwind CSS (main)
        working-directory: ./main/site
        run: npm run build:css

      - name: Build Hugo (main)
        working-directory: ./main/site
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"
        env:
          HUGO_ENV: production

      # Build v2 site into /v2/ subdirectory
      - name: Install dependencies (v2)
        if: hashFiles('v2/site/package.json') != ''
        working-directory: ./v2/site
        run: npm ci
        continue-on-error: true

      - name: Build Tailwind CSS (v2)
        if: hashFiles('v2/site/package.json') != ''
        working-directory: ./v2/site
        run: npm run build:css
        continue-on-error: true

      - name: Build Hugo (v2)
        if: hashFiles('v2/site/hugo.toml') != ''
        working-directory: ./v2/site
        run: hugo --minify
        env:
          HUGO_ENV: production
        continue-on-error: true

      - name: Merge v2 into main output
        run: |
          if [ -d "v2/site/public" ]; then
            mkdir -p main/site/public/v2
            cp -r v2/site/public/* main/site/public/v2/
            echo "V2 site merged into /v2/ subdirectory"
          else
            echo "No v2 build found, skipping"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./main/site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
